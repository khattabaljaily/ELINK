{% extends "base.html" %}

{% block title %}Log in · E LINK{% endblock %}

{% block content %}
  <div class="auth-card">
    <h1 class="section-title" style="font-size:1.4rem">Log in</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="{{ form.username.id_for_label }}">Username or email</label>
        {{ form.username }}
      </div>
      <div class="form-group">
        <label for="{{ form.password.id_for_label }}">Password</label>
        {{ form.password }}
      </div>
      {% if form.non_field_errors %}
        <p class="form-errors">{{ form.non_field_errors }}</p>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p class="auth-card__footer">Don't have an account? <a href="{% url 'accounts:register' %}">Sign up</a></p>
  </div>
{% endblock %}
