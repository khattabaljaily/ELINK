{% extends "base.html" %}

{% block title %}Order Confirmed · E LINK{% endblock %}

{% block content %}
  <div class="page">
    <div class="confirmation-panel">
      <div class="confirmation-icon">&#10003;</div>
      <h1>Order placed successfully</h1>
      <p class="text-muted">Thank you! Your order #{{ order.id }} has been received and will be paid for in cash on delivery.</p>
      <a href="{% url 'orders:detail' order.id %}" class="btn btn-primary">View order</a>
      <a href="{% url 'products:list' %}" class="btn btn-outline" style="margin-top:10px">Continue shopping</a>
    </div>
  </div>
{% endblock %}
