{% extends "dashboard/base.html" %}

{% block page_title %}Confirm delete{% endblock %}

{% block content %}
  <div class="dash-card" style="max-width:480px;margin:0 auto;">
    <h2>{{ title|default:"Are you sure?" }}</h2>
    {% if warning %}
      <p class="text-muted">{{ warning }}</p>
    {% else %}
      <p class="text-muted">This action can't be undone.</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-actions">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a href="{{ cancel_url }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
