<p class="text-muted" style="margin-bottom:14px;font-size:0.88rem;">
  Setting a new password for <strong>{{ employee.username }}</strong>. They won't need their old password.
</p>

<form method="post" action="{{ request.path }}">
  {% csrf_token %}
  <div class="form-group">
    <label for="{{ form.new_password1.id_for_label }}">New password</label>
    {{ form.new_password1 }}
    {% for error in form.new_password1.errors %}<p class="form-errors">{{ error }}</p>{% endfor %}
  </div>
  <div class="form-group">
    <label for="{{ form.new_password2.id_for_label }}">Confirm new password</label>
    {{ form.new_password2 }}
    {% for error in form.new_password2.errors %}<p class="form-errors">{{ error }}</p>{% endfor %}
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary btn-sm">Set password</button>
  </div>
</form>
